<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amington Hall - Additional Extras</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <header class="form-header">
                <div class="header-content">
                    <img src="logo.png" alt="Amington Hall Logo" class="logo">
                    <div class="header-text">
                        <h1>Amington Hall</h1>
                        <p class="tagline">Walkthrough Register</p>
                    </div>
                </div>
            </header>
            
            <form id="page6-form" class="wedding-form">
                <h2 class="page-title">Additional Extras</h2>
                
                <!-- Dancefloor Section -->
                <h3 class="section-subtitle">Dancefloor</h3>
               
                
                <div class="form-group">
                    <label>Will you require a dancefloor?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="dancefloor" value="Yes">
                            <span class="radio-custom"></span>
                            <span class="radio-text">Yes</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="dancefloor" value="No">
                            <span class="radio-custom"></span>
                            <span class="radio-text">No</span>
                        </label>
                    </div>
                </div>

                <!-- Dancefloor Options (Hidden by default) -->
                <div id="dancefloor-options" style="display: none;">
                    <div class="form-group">
                        <label>Dancefloor Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="dancefloor-type" value="DANCEFLOOR (LED style without the lights)">
                                <span class="radio-custom"></span>
                                <span class="radio-text">DANCEFLOOR (LED style without the lights)</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="dancefloor-type" value="HIP SHEET WITH CUSTOM VINYLS">
                                <span class="radio-custom"></span>
                                <span class="radio-text">HIP SHEET WITH CUSTOM VINYLS</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dancefloor-size">Size</label>
                        <select id="dancefloor-size" name="dancefloor-size" class="select-input">
                            <option value="">Select size</option>
                            <option value="16x16ft">16x16ft</option>
                            <option value="16x20ft">16x20ft</option>
                            <option value="20x20ft">20x20ft</option>
                        </select>
                    </div>
                </div>

                <!-- Cake Section -->
                <h3 class="section-subtitle">Cake</h3>

                <div class="form-group">
                    <label for="cake-company">Cake Company name:</label>
                    <input type="text" id="cake-company" name="cake-company">
                </div>

                <div class="form-group">
                    <label for="cake-contact-name">Contact Name:</label>
                    <input type="text" id="cake-contact-name" name="cake-contact-name">
                </div>

                <div class="form-group">
                    <label for="cake-contact-number">Contact Number:</label>
                    <div class="phone-input-wrapper">
                        <input type="text" id="cake-contact-number-prefix" name="cake-contact-number-prefix" value="+44" class="phone-prefix">
                        <input type="tel" id="cake-contact-number" name="cake-contact-number" class="phone-number">
                    </div>
                </div>

                <div class="form-group">
                    <label for="cake-tiers">Number of tiers:</label>
                    <input type="number" id="cake-tiers" name="cake-tiers" min="1">
                </div>

                <div class="form-group">
                    <label>Arrangements of the cake?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="cake-served" value="To be cut up by staff and served with the tea after food.">
                            <span class="radio-custom"></span>
                            <span class="radio-text">To be cut up by staff and served with the tea after food.</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="cake-served" value="To be boxed up and given back to the family.">
                            <span class="radio-custom"></span>
                            <span class="radio-text">To be boxed up and given back to the family.</span>
                        </label>
                    </div>
                </div>

                <!-- Favours/Menu Cards/Thank you cards Section -->
                <h3 class="section-subtitle">Favours/Menu Cards/Thank you cards</h3>
                
                <div class="form-group">
                    <label>Will you be having favours?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="favours" value="Yes">
                            <span class="radio-custom"></span>
                            <span class="radio-text">Yes</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="favours" value="No">
                            <span class="radio-custom"></span>
                            <span class="radio-text">No</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="favours-type">Type of favour:</label>
                    <input type="text" id="favours-type" name="favours-type" placeholder="1 per plate">
                </div>

                <div class="form-group">
                    <label>Will you be having Thank you cards?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="thankyou-cards" value="Yes">
                            <span class="radio-custom"></span>
                            <span class="radio-text">Yes</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="thankyou-cards" value="No">
                            <span class="radio-custom"></span>
                            <span class="radio-text">No</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Will you be having menu cards?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="menu-cards" value="Yes">
                            <span class="radio-custom"></span>
                            <span class="radio-text">Yes</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="menu-cards" value="No">
                            <span class="radio-custom"></span>
                            <span class="radio-text">No</span>
                        </label>
                    </div>
                </div>

                <div id="menu-cards-placement-section" style="display: none;">
                    <div class="form-group">
                        <label for="menu-cards-placement">Menu card placement:</label>
                        <select id="menu-cards-placement" name="menu-cards-placement" class="select-input">
                            <option value="">Select placement</option>
                            <option value="1 per plate">1 per plate</option>
                            <option value="2 per table">2 per table</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <input type="text" id="menu-cards-placement-other-text" name="menu-cards-placement-other-text" placeholder="Please specify" style="margin-top: 12px; display: none;">
                </div>

                <!-- Navigation Buttons -->
                <div class="form-navigation">
                    <button type="button" class="nav-btn prev-btn" id="prev-btn">Previous</button>
                    <button type="button" class="nav-btn restart-btn" id="restart-btn">Restart Form</button>
                    <button type="button" class="nav-btn save-btn" id="save-btn">Save Progress</button>
                    <button type="submit" class="nav-btn next-btn">Next</button>
                </div>

                <!-- Progress Indicator -->
                <div class="progress-indicator">
                    <span class="page-info">Page 6 of 11</span>
                </div>
            </form>
            
            <footer class="form-footer">
                <p>&copy; 2025 Amington Hall. All rights reserved.</p>
                <p class="made-by">Made by <a href="https://systemifyautomation.com" target="_blank" rel="noopener noreferrer">Systemify Automation</a></p>
            </footer>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="notification" id="notification"></div>

    <script src="page6.js"></script>
</body>
</html>
