<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amington Hall - Wedding Inquiry Form</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <header class="form-header">
                <div class="header-content">
                    <img src="logo.png" alt="Amington Hall Logo" class="logo">
                    <div class="header-text">
                        <h1>Amington Hall</h1>
                        <p class="tagline">Walkthrough Register</p>
                    </div>
                </div>
            </header>
            
            <form id="wedding-inquiry-form" class="wedding-form">
                <!-- Question 1 -->
                <div class="form-group">
                    <label for="your-name">
                        What is you name? <span class="required">*</span>
                    </label>
                    <input type="text" id="your-name" name="your-name" placeholder="Short answer text" required>
                </div>

                <!-- Question 2 -->
                <div class="form-group">
                    <label for="groom-name">
                        What is the name of the groom? <span class="required">*</span>
                    </label>
                    <input type="text" id="groom-name" name="groom-name" placeholder="Short answer text" required>
                </div>

                <!-- Question 3 -->
                <div class="form-group">
                    <label for="bride-name">
                        What is the name of the bride? <span class="required">*</span>
                    </label>
                    <input type="text" id="bride-name" name="bride-name" placeholder="Short answer text" required>
                </div>

                <!-- Question 4 -->
                <div class="form-group">
                    <label for="ethnicity">
                        What is your Ethnicity / Cultural Background ? <span class="required">*</span>
                    </label>
                    <input type="text" id="ethnicity" name="ethnicity" placeholder="Short answer text" required>
                </div>

                <!-- Question 5 -->
                <div class="form-group">
                    <label for="event-date">
                        What is the date of the event? <span class="required">*</span>
                    </label>
                    <input type="text" id="event-date" name="event-date" placeholder="Select date..." required readonly>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>
            
            <footer class="form-footer">
                <p>&copy; 2025 Amington Hall. All rights reserved.</p>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
</body>
</html>
